name: "Publish a new LoanKaise post"
description: "SEO fields भरें और नया post automatically publish करें"
title: "[Publish] "
body:
  - type: markdown
    attributes:
      value: |
        ## LoanKaise Post Publisher
        सभी required fields भरें। Submit करते ही post, homepage, Loan Blog और sitemap update होंगे।
  - type: input
    id: post_title
    attributes:
      label: Post Title
      description: Page पर दिखाई देने वाला स्पष्ट title
      placeholder: "SBI Personal Loan कैसे लें?"
    validations:
      required: true
  - type: input
    id: slug
    attributes:
      label: URL Slug
      description: केवल छोटे English letters, numbers और hyphen
      placeholder: "sbi-personal-loan-kaise-le"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Loan Gyan
        - Bank
        - Personal Loan
        - Home Loan
        - Business Loan
        - Education Loan
        - Gold Loan
        - Car Loan
        - Property Loan
        - Corporate Loan
        - News
    validations:
      required: true
  - type: input
    id: meta_title
    attributes:
      label: SEO Meta Title
      description: लगभग 50–60 characters
      placeholder: "SBI Personal Loan कैसे लें – Eligibility और Process"
    validations:
      required: true
  - type: textarea
    id: meta_description
    attributes:
      label: SEO Meta Description
      description: लगभग 140–160 characters में page का सार
      placeholder: "SBI personal loan की eligibility, documents, interest और आवेदन process आसान हिंदी में जानें।"
    validations:
      required: true
  - type: input
    id: focus_keyword
    attributes:
      label: Focus Keyword
      placeholder: "SBI personal loan kaise le"
    validations:
      required: true
  - type: input
    id: featured_image
    attributes:
      label: Featured Image URL
      description: Optional HTTPS image URL
      placeholder: "https://example.com/image.jpg"
  - type: textarea
    id: article_body
    attributes:
      label: Article Body
      description: Markdown supported — headings के लिए ##, bold के लिए **text**, links के लिए [text](URL)
      placeholder: |
        परिचय यहाँ लिखें।

        ## Eligibility
        पूरी जानकारी यहाँ लिखें।
    validations:
      required: true
  - type: checkboxes
    id: confirmation
    attributes:
      label: Publish Confirmation
      options:
        - label: "मैंने title, URL और SEO description जाँच लिए हैं"
          required: true
