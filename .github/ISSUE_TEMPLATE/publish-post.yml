name: "Publish a new LoanKaise post"
description: "SEO fields भरें और नया post automatically publish करें"
title: "[Publish] "
body:
  - type: markdown
    attributes:
      value: |
        ## LoanKaise Post Publisher + SEO Score
        सभी required fields भरें। Submit करते ही post, homepage, Loan Blog और sitemap update होंगे।
        Post **हर SEO score पर publish होगा**। Publish होने के बाद इसी issue में 100 में score और सुधारों की checklist मिलेगी।
  - type: input
    id: post_title
    attributes:
      label: Post Title
      description: Page पर दिखाई देने वाला स्पष्ट title; focus keyword शुरुआत के पास रखें
      placeholder: "SBI Personal Loan कैसे लें?"
    validations:
      required: true
  - type: input
    id: slug
    attributes:
      label: URL Slug
      description: केवल छोटे English letters, numbers और hyphen; focus keyword शामिल करें
      placeholder: "sbi-personal-loan-kaise-le"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Loan Gyan
        - Bank
        - Personal Loan
        - Home Loan
        - Business Loan
        - Education Loan
        - Gold Loan
        - Car Loan
        - Property Loan
        - Corporate Loan
        - News
    validations:
      required: true
  - type: input
    id: meta_title
    attributes:
      label: SEO Meta Title
      description: 50–60 characters; focus keyword शामिल करें
      placeholder: "SBI Personal Loan कैसे लें – Eligibility और Process"
    validations:
      required: true
  - type: textarea
    id: meta_description
    attributes:
      label: SEO Meta Description
      description: 140–160 characters; focus keyword और click करने का स्पष्ट कारण शामिल करें
      placeholder: "SBI personal loan की eligibility, documents, interest और आवेदन process आसान हिंदी में जानें।"
    validations:
      required: true
  - type: input
    id: focus_keyword
    attributes:
      label: Focus Keyword
      description: मुख्य search phrase; title, slug, description और शुरुआती paragraph में रखें
      placeholder: "SBI personal loan kaise le"
    validations:
      required: true
  - type: input
    id: featured_image
    attributes:
      label: Featured Image URL
      description: Optional HTTPS image URL
      placeholder: "https://example.com/image.jpg"
  - type: input
    id: image_alt
    attributes:
      label: Featured Image Alt Text
      description: Image का सरल वर्णन; संभव हो तो focus keyword naturally शामिल करें
      placeholder: "SBI personal loan apply process"
  - type: textarea
    id: article_body
    attributes:
      label: Article Body
      description: 600+ words बेहतर; ## headings, lists, कम से कम 1 internal और 1 official external link रखें
      placeholder: |
        परिचय यहाँ लिखें।

        ## Eligibility
        पूरी जानकारी यहाँ लिखें।

        ## Documents
        - Aadhaar Card
        - PAN Card

        [संबंधित LoanKaise guide](https://loankaise.in/loan-kya-hai/)
        [Official bank website](https://sbi.co.in/)
    validations:
      required: true
  - type: checkboxes
    id: confirmation
    attributes:
      label: Publish Confirmation
      options:
        - label: "मैंने title, URL और SEO description जाँच लिए हैं"
          required: true
